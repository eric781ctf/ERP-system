services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: erp_dev
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://erp:erp_password@db:5432/erp_dev
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      JWT_SECRET_KEY: dev-secret-change-in-production
      FLASK_ENV: development
      FLASK_APP: app.py
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

volumes:
  postgres_data:
