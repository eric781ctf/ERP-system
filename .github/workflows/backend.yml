name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  test-build-deploy:
    name: Test → Build → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Run Tests ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest --tb=short -q
        env:
          FLASK_ENV: testing

      # ── 3. Configure AWS credentials via OIDC ────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 4. Login to ECR ──────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 5. Build & Push Docker image ─────────────────────────────
      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY_URL }}
          docker build \
            -t $IMAGE_URI:$GITHUB_SHA \
            -t $IMAGE_URI:latest \
            .
          docker push $IMAGE_URI:$GITHUB_SHA
          docker push $IMAGE_URI:latest
          echo "image_uri=$IMAGE_URI:$GITHUB_SHA" >> $GITHUB_ENV

      # ── 6. Deploy to App Runner ──────────────────────────────────
      - name: Wait for App Runner to be RUNNING before deploy
        run: |
          echo "Ensuring App Runner is RUNNING before deploying..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
              --region ${{ env.AWS_REGION }} \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ Ready to deploy"
              break
            elif [ "$STATUS" = "OPERATION_IN_PROGRESS" ]; then
              sleep 20
            else
              echo "❌ Unexpected status: $STATUS"
              exit 1
            fi
          done

      - name: Deploy to App Runner
        run: |
          IMAGE_URI=${{ secrets.ECR_REPOSITORY_URL }}:$GITHUB_SHA
          aws apprunner update-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"arn:aws:iam::129263125308:role/AppRunnerECRAccessRole\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"$IMAGE_URI\",
                \"ImageConfiguration\": {
                  \"Port\": \"8080\",
                  \"RuntimeEnvironmentVariables\": {
                    \"APP_VERSION\": \"$GITHUB_SHA\",
                    \"CORS_ALLOWED_ORIGINS\": \"https://d3n7k0ruchkryg.cloudfront.net\"
                  }
                },
                \"ImageRepositoryType\": \"ECR\"
              }
            }"

      # ── 7. Wait for App Runner & health check ────────────────────
      - name: Wait for App Runner deployment
        run: |
          echo "Waiting for App Runner deployment to complete..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
              --region ${{ env.AWS_REGION }} \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ App Runner is RUNNING"
              break
            elif [ "$STATUS" = "OPERATION_IN_PROGRESS" ]; then
              sleep 20
            else
              echo "❌ Unexpected status: $STATUS"
              exit 1
            fi
          done

      - name: Health check
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Service.ServiceUrl' --output text)
          echo "Checking https://$SERVICE_URL/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$SERVICE_URL/health)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "❌ Health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
